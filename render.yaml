services:
  - type: web
    name: lifeos
    env: python
    startCommand: python -m backend.main
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: BOT_OWNER_ID
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TZ
        value: Asia/Tehran
      - key: BIO_UPDATE_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: INFO
