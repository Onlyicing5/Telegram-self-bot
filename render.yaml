services:\n  - type: web\n    name: lifeos\n    env: python\n    startCommand: python -m backend.main\n    healthCheckPath: /health\n    envVars:\n      - key: PYTHON_VERSION\n        value: 3.11.7\n      - key: API_ID\n        sync: false\n      - key: API_HASH\n        sync: false\n      - key: SESSION_STRING\n        sync: false\n      - key: BOT_OWNER_ID\n        sync: false\n      - key: SUPABASE_URL\n        sync: false\n      - key: SUPABASE_SERVICE_ROLE_KEY\n        sync: false\n      - key: TZ\n        value: Asia/Tehran\n      - key: BIO_UPDATE_ENABLED\n        value: "false"\n      - key: LOG_LEVEL\n        value: INFO\n